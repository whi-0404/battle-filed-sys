name: battlefield_client
description: Battlefield real-time radar client
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # gRPC & Protobuf
  grpc: ^5.1.0
  protobuf: ^6.0.0
  fixnum: ^1.1.0

  # Map
  flutter_map: ^7.0.1
  latlong2: ^0.9.0

  # State management
  provider: ^6.1.2

  # UI / Animation
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
